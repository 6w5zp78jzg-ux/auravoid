# Blueprint de Despliegue - Aura & Void Engine
image: node:20-alpine

pages:
  stage: deploy
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .npm/
  script:
    # 1. Instalación limpia y rápida
    - npm ci --cache .npm --prefer-offline
    
    # 2. Construcción del proyecto (genera la carpeta 'out')
    - npm run build
    
    # 3. Adaptación a GitLab: Next exporta a 'out', pero GitLab Pages exige la carpeta 'public'
    - rm -rf public
    - mv out public
  artifacts:
    paths:
      - public
  rules:
    # Este pipeline SOLO se ejecutará cuando hagas push a tu rama principal
    - if: $CI_COMMIT_BRANCH == "main"
